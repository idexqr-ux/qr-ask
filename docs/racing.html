<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <a class="back" href="./index.html">← Back to Gate</a>
    <h1 id="raceTitle">Race</h1>
    <div id="runners"></div>
    <p><a class="back" href="./legends.html">Legends</a></p>
  </div>
<script src="./app.js"></script>
<script>
(async () => {
  const raceNo = qs("race_no") || "1";
  const data = await loadCSV("./gatecard.csv");

  const raceRows = data.filter(r => String(r.race_no) === String(raceNo));
  if (!raceRows.length) {
    document.getElementById("raceTitle").textContent = "Race not found";
    return;
  }

  const raceHeader = raceRows.find(r => !String(r.horse_no || "").trim());
  const runners = raceRows
    .filter(r => String(r.horse_no || "").trim())
    .sort((a,b) => Number(a.horse_no) - Number(b.horse_no));

  const meeting = (raceHeader?.meeting_name || runners[0]?.meeting_name || "Meeting").trim();
  const raceName = (raceHeader?.race_name || runners[0]?.race_name || "Race").trim();

  document.getElementById("raceTitle").textContent =
    `${meeting} — Race ${raceNo}: ${raceName}`;

  document.getElementById("runners").innerHTML = runners.map(r =>
    `<a class="card" href="./runner.html?race_no=${encodeURIComponent(r.race_no)}&horse_no=${encodeURIComponent(r.horse_no)}">
      <div class="title">${r.horse_no}. ${r.horse_name}</div>
      <div class="sub">${r.trainer_name} • ${r.jockey_name} • ${r.weight_stone}st ${r.weight_pounds}lb</div>
    </a>`
  ).join("") || `<div class="card">No runners found for this race.</div>`;
})();
</script>
 
</body>
</html>
