<script>
function qs(name) {
  return new URLSearchParams(location.search).get(name);
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length);
  if (!lines.length) return [];

  const splitLine = (line) => {
    const out = [];
    let cur = "";
    let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      const n = line[i + 1];
      if (c === '"' && inQ && n === '"') { cur += '"'; i++; continue; }
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { out.push(cur); cur = ""; continue; }
      cur += c;
    }
    out.push(cur);
    return out.map(s => s.trim());
  };

  const rawHeaders = splitLine(lines[0]);
  const headers = rawHeaders.map(h => String(h).replace(/^\uFEFF/, "").trim());

  return lines.slice(1).map(line => {
    const cols = splitLine(line);
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (cols[idx] ?? "").trim());
    return obj;
  });
}

async function loadCSV(url) {
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error(`CSV fetch failed: ${res.status}`);
  const text = await res.text();
  return parseCSV(text);
}

function format12h(rawTime) {
  if (!rawTime) return "";
  const parts = rawTime.split(":");
  if (parts.length < 2) return "";
  const hours = Number(parts[0]);
  const minutes = Number(parts[1]);
  if (Number.isNaN(hours) || Number.isNaN(minutes)) return "";

  const suffix = hours >= 12 ? "pm" : "am";
  const hour12 = hours % 12 || 12;
  return `${hour12}:${String(minutes).padStart(2,"0")}${suffix}`;
}

(async () => {
  try {
    const raceNo = qs("race_no") || "1";
    const url = "https://idexqr-ux.github.io/ask-pilot-/gatecard.csv?x=" + Date.now();
    const data = await loadCSV(url);

    const raceRows = data.filter(r => String(r.race_no) === String(raceNo));
    const runnersEl = document.getElementById("runners");
    const titleEl = document.getElementById("raceTitle");

    if (!raceRows.length) {
      titleEl.textContent = "Race not found";
      runnersEl.textContent = `No rows matched race_no=${raceNo}.`;
      return;
    }

    const raceHeader = raceRows.find(r => !String(r.horse_no || "").trim());
    const runners = raceRows
      .filter(r => String(r.horse_no || "").trim())
      .sort((a,b) => Number(a.horse_no) - Number(b.horse_no));

    const meeting = (raceHeader?.meeting_name || runners[0]?.meeting_name || "Meeting").trim();
    const raceName = (raceHeader?.race_name || runners[0]?.race_name || "Race").trim();
    const displayTime = format12h((raceHeader?.race_time || runners[0]?.race_time || "").trim());

    titleEl.textContent =
      `${meeting} — Race ${raceNo}${displayTime ? " (" + displayTime + ")" : ""}: ${raceName}`;

    runnersEl.innerHTML = ""; // clear

    if (!runners.length) {
      const empty = document.createElement("div");
      empty.className = "card";
      empty.textContent = "No runners found for this race.";
      runnersEl.appendChild(empty);
      return;
    }

    for (const r of runners) {
      const a = document.createElement("a");
      a.className = "card";
      a.href = `./runner.html?race_no=${encodeURIComponent(r.race_no)}&horse_no=${encodeURIComponent(r.horse_no)}`;

      const rowTop = document.createElement("div");
      rowTop.className = "row-top";

      const silks = (r.silks_img || "").trim();
      if (silks) {
        const img = document.createElement("img");
        img.className = "silks";
        img.src = `./${silks}`;
        img.alt = "Racing colours";
        rowTop.appendChild(img);
      }

      const t = document.createElement("div");
      t.className = "title";
      t.textContent = `${r.horse_no}. ${r.horse_name}`;
      rowTop.appendChild(t);

      const subT = document.createElement("div");
      subT.className = "sub";
      subT.innerHTML = `<strong>T:</strong> ${r.trainer_name}`;

      const subJ = document.createElement("div");
      subJ.className = "sub";
      subJ.innerHTML = `<strong>J:</strong> ${r.jockey_name}`;

      const w = document.createElement("div");
      w.className = "muted-line";
      w.textContent = `${r.weight_stone}st ${r.weight_pounds}lb`;

      a.appendChild(rowTop);
      a.appendChild(subT);
      a.appendChild(subJ);
      a.appendChild(w);

      runnersEl.appendChild(a);
    }

  } catch (err) {
    const runnersEl = document.getElementById("runners");
    const e = document.createElement("div");
    e.className = "card";
    e.textContent = `Error: ${String(err)}`;
    runnersEl.innerHTML = "";
    runnersEl.appendChild(e);
  }
})();
</script>
