<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <a class="back" href="./index.html">← Back to Gate</a>
    <h1 id="raceTitle">Race</h1>
    <div id="runners"></div>
    <p><a class="back" href="./legends.html">Legends</a></p>
  </div>

  <script src="./app.js"></script>
  <script>
  (async () => {
    const raceNo = qs("race_no") || "1";
    const data = await loadCSV("./gatecard.csv");

    const rows = data
      .filter(r => String(r.race_no) === String(raceNo))
      .sort((a, b) => Number(a.horse_no) - Number(b.horse_no));

    document.getElementById("raceTitle").textContent =
      rows.length ? `${rows[0].event_name} — Race ${rows[0].race_no}` : "Race not found";

    document.getElementById("runners").innerHTML = rows.map(r =>
      `<a class="card" href="./runner.html?race_no=${encodeURIComponent(r.race_no)}&horse_no=${encodeURIComponent(r.horse_no)}">
        <div class="title">${r.horse_no}. ${r.horse_name}</div>
        <div class="sub">${r.trainer} • ${r.jockey}</div>
      </a>`
    ).join("");
  })().catch(err => console.error("RACING ERROR:", err));
  </script>
</body>
</html>
