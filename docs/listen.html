<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Listen | IdexQR</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #F7F9F8;
      color: #2b2b2b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 50px;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }

    .wrap {
      width: min(92%, 420px);
    }

    h1 {
      margin-bottom: 8px;
      font-weight: normal;
    }

    p {
      margin-top: 0;
      line-height: 1.5;
    }

    .listen-card {
      margin-top: 18px;
      background: #B8C6C1;
      border-radius: 18px;
      padding: 18px 16px;
    }

    .listen-title {
      font-size: 20px;
      letter-spacing: 1px;
      margin: 0 0 12px;
    }

    audio {
      width: 100%;
      margin-top: 6px;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #2b2b2b;
      text-decoration: none;
      border-bottom: 1px solid rgba(43,43,43,0.25);
      padding-bottom: 2px;
    }

    .back-link:hover {
      border-bottom-color: rgba(43,43,43,0.5);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Listen</h1>
    <p>A calm place to listen.</p>

    <div class="listen-card">
      <p class="listen-title">Play</p>
      <audio controls>
       <source src="audio/at-the-coffee-machine.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <a href="index.html" class="back-link">Back to IdexQR</a>
  </div>
</body>
</html>
