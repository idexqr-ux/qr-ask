<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
 <a class="back" href="./index.html">← Back to Race Card</a>
 <h1 id="raceTitle">Race</h1>
<p class="hint">Tap a runner to explore their details and Ask deeper questions.</p>
<div id="runners"></div>
 <p class="hint">Not sure what a code means? Legends explains form codes, weights, and abbreviations.</p>   
<p><a class="back" href="./legends.html">Racing Legends & Codes</a></p>
  </div>
<script>
function qs(name) {
  return new URLSearchParams(location.search).get(name);
}

function parseCSV(text) {
  // Handle BOM and normal comma CSV
  const lines = text.split(/\r?\n/).filter(l => l.trim().length);
  if (!lines.length) return [];

  // Split by comma with basic quote handling
  const splitLine = (line) => {
    const out = [];
    let cur = "";
    let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      const n = line[i + 1];
      if (c === '"' && inQ && n === '"') { cur += '"'; i++; continue; }
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { out.push(cur); cur = ""; continue; }
      cur += c;
    }
    out.push(cur);
    return out.map(s => s.trim());
  };

  const rawHeaders = splitLine(lines[0]);
  const headers = rawHeaders.map(h => String(h).replace(/^\uFEFF/, "").trim());

  return lines.slice(1).map(line => {
    const cols = splitLine(line);
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (cols[idx] ?? "").trim());
    return obj;
  });
}

async function loadCSV(url) {
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error(`CSV fetch failed: ${res.status}`);
  const text = await res.text();
  return parseCSV(text);
}

(async () => {
  const raceNo = qs("race_no") || "1";

  // Absolute URL to remove any path confusion
  const url = "https://idexqr-ux.github.io/ask-pilot-/gatecard.csv?x=" + Date.now();
  const data = await loadCSV(url);

  const raceRows = data.filter(r => String(r.race_no) === String(raceNo));
  if (!raceRows.length) {
    document.getElementById("raceTitle").textContent = "Race not found";
    document.getElementById("runners").innerHTML = `<div class="card">No rows matched race_no=${raceNo}.</div>`;
    return;
  }

  const raceHeader = raceRows.find(r => !String(r.horse_no || "").trim());
  const runners = raceRows
    .filter(r => String(r.horse_no || "").trim())
    .sort((a,b) => Number(a.horse_no) - Number(b.horse_no));

  const meeting = (raceHeader?.meeting_name || runners[0]?.meeting_name || "Meeting").trim();
  const raceName = (raceHeader?.race_name || runners[0]?.race_name || "Race").trim();
const rawTime = (raceHeader?.race_time || runners[0]?.race_time || "").trim();

let displayTime = "";

if (rawTime) {
  const [hours, minutes] = rawTime.split(":").map(Number);
  const suffix = hours >= 12 ? "pm" : "am";
  const hour12 = hours % 12 || 12;
  displayTime = `${hour12}:${String(minutes).padStart(2,"0")}${suffix}`;
}

document.getElementById("raceTitle").textContent =
  `${meeting} — Race ${raceNo}${displayTime ? " (" + displayTime + ")" : ""}: ${raceName}`;
  

  document.getElementById("runners").innerHTML = runners.map(r =>
    `<a class="card" href="./runner.html?race_no=${encodeURIComponent(r.race_no)}&horse_no=${encodeURIComponent(r.horse_no)}">
      <div class="title">${r.horse_no}. ${r.horse_name}</div>
      .card .sub {
  font-size: 1.03rem;
  margin-top: 4px;
}

.card .sub + .sub {
  margin-top: 2px;   /* tighter between trainer and jockey */
}
<div class="muted-line">${r.weight_stone}st ${r.weight_pounds}lb</div>
  
    </a>`
  ).join("") || `<div class="card">No runners found for this race.</div>`;
})();
</script>
 
</body>
</html>
