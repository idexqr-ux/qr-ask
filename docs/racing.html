<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
  <a class="back" href="./index.html">← Back to Ask Pilot</a>

    <h1 id="raceTitle">Race</h1>
    <p id="probe" class="hint">JS probe: waiting…</p>

  <p class="hint">Tap a runner to explore their details and listen for more guidance.</p>
<p>
  <button onclick="playAudio('audio/distance.mp3')">
    Listen — I’ll explain the distance
  </button>
</p>

<div id="runners"></div>

    <p class="hint">Not sure what a code means? Legends explains form codes, weights, and abbreviations.</p>
    <p><a class="back" href="./legends.html">Racing Legends & Codes</a></p>
  </div>

  <script>
  document.getElementById("probe").textContent = "JS probe: running ✅";

function qs(name) {
  return new URLSearchParams(location.search).get(name);
}

function parseCSV(text) {
  // Quote-aware CSV parser (handles commas inside "quoted fields")
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];

    if (ch === '"') {
      // Escaped quote within a quoted field: "" -> "
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
      continue;
    }

    if (ch === "," && !inQuotes) {
      row.push(cell.trim());
      cell = "";
      continue;
    }

    if (ch === "\n" && !inQuotes) {
      row.push(cell.trim());
      cell = "";
      if (row.some(v => v.length)) rows.push(row);
      row = [];
      continue;
    }

    cell += ch;
  }

  // flush last cell/row
  if (cell.length || row.length) {
    row.push(cell.trim());
    if (row.some(v => v.length)) rows.push(row);
  }

  if (!rows.length) return [];

  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(cols => {
    const obj = {};
    headers.forEach((h, idx) => {
      obj[h] = (cols[idx] ?? "").trim();
    });
    return obj;
  });
}

async function loadCSV(url) {
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error("CSV fetch failed: " + res.status);
  return parseCSV(await res.text());
}

function format12h(raw) {
  if (!raw) return "";

  const s = String(raw).trim().toLowerCase();

  // If the CSV already contains am/pm, respect it.
  const hasAm = s.includes("am");
  const hasPm = s.includes("pm");

  // Extract time like 1:45 or 13:45 (ignore other characters)
  const m = s.match(/(\d{1,2})\s*[:.]\s*(\d{2})/);
  if (!m) return "";

  let h = Number(m[1]);
  const mins = Number(m[2]);
  if (!Number.isFinite(h) || !Number.isFinite(mins) || mins < 0 || mins > 59) return "";

  // 24-hour input (e.g. 13:45)
  if (h >= 13 && h <= 23) {
    const hour12 = h % 12;
    return `${hour12}:${String(mins).padStart(2, "0")}pm`;
  }
  if (h === 0) return `12:${String(mins).padStart(2, "0")}am`;
  if (h === 12) return `12:${String(mins).padStart(2, "0")}${hasAm ? "am" : "pm"}`;

  // Ambiguous 1–11: if no suffix given, assume PM (race-day default)
  if (!hasAm && !hasPm) {
    return `${h}:${String(mins).padStart(2, "0")}pm`;
  }

  // If suffix is provided, use it
  const suffix = hasPm ? "pm" : "am";
  return `${h}:${String(mins).padStart(2, "0")}${suffix}`;
}

  (async function () {

  const raceNo = qs("race_no") || "1";
  const runnersEl = document.getElementById("runners");
  const titleEl = document.getElementById("raceTitle");

  runnersEl.textContent = "Loading…";

const localUrl = "./gatecard.csv?x=" + Date.now();
const remoteUrl = "https://idexqr-ux.github.io/ask-pilot-/gatecard.csv?x=" + Date.now();

try {

  let data;

  try {
    data = await loadCSV(localUrl);        // try local first
  } catch {
    data = await loadCSV(remoteUrl);       // fallback if local fails
  }

    const raceRows = data.filter(r => r.race_no === raceNo);

    if (!raceRows.length) {
      titleEl.textContent = "Race not found";
      runnersEl.textContent = "";
      return;
    }

    const raceHeader = raceRows.find(r => !r.horse_no);
    const runners = raceRows.filter(r => r.horse_no);

    const meeting = raceHeader?.meeting_name || "Meeting";
    const raceName = raceHeader?.race_name || "Race";
    const time = format12h(raceHeader?.race_time || "");

    titleEl.textContent =
      meeting + " — Race " + raceNo +
      (time ? " (" + time + ")" : "") +
      ": " + raceName;

    runnersEl.innerHTML = "";

    runners.forEach(r => {

      const card = document.createElement("a");
      card.className = "card";
      card.href = "./runner.html?race_no=" + r.race_no + "&horse_no=" + r.horse_no;

      const rowTop = document.createElement("div");
      rowTop.className = "row-top";

      const horseTitle = document.createElement("div");
      horseTitle.className = "runner-title";
      horseTitle.textContent = r.horse_no + ". " + r.horse_name;

      rowTop.appendChild(horseTitle);

      if (r.silks_img) {
        const img = document.createElement("img");
        img.className = "silks";
        img.src = "./" + r.silks_img;
        img.alt = "Racing colours";
        rowTop.appendChild(img);
      }

      const t = document.createElement("div");
      t.className = "sub";
      t.innerHTML = "<strong>T:</strong> " + r.trainer_name;

      const j = document.createElement("div");
      j.className = "sub";
      j.innerHTML = "<strong>J:</strong> " + r.jockey_name;

      const w = document.createElement("div");
      w.className = "muted-line";
     const st = (r.weight_stone || "").trim();
const lb = (r.weight_pounds || "").trim();
w.textContent = (st || lb) ? `${st}st ${lb}lb` : "";

      card.appendChild(rowTop);
      card.appendChild(t);
      card.appendChild(j);
      card.appendChild(w);

      runnersEl.appendChild(card);

    });

  } catch (err) {

    titleEl.textContent = "Race (couldn’t load data)";
    runnersEl.textContent = "Error: " + err.message;

  }

})();
  </script>
    
<script>
let currentAudio = null;

function playAudio(file) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  currentAudio = new Audio(file);
  currentAudio.play();
}
</script>
</body>
</html>
